{{- if .Values.rbac.create -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubeclaw.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
rules:
{{- toYaml .Values.rbac.rules | nindent 2 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kubeclaw.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kubeclaw.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "kubeclaw.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeclaw.fullname" . }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubeclaw.fullname" . }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubeclaw.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "kubeclaw.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
{{- end }}
