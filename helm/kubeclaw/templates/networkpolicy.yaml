{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubeclaw.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubeclaw.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- toYaml .Values.networkPolicy.policyTypes | nindent 4 }}

  {{- if .Values.networkPolicy.ingressRules }}
  ingress:
    {{- range .Values.networkPolicy.ingressRules }}
    - from:
        {{- toYaml .from | nindent 8 }}
      ports:
        {{- toYaml .ports | nindent 8 }}
    {{- end }}
  {{- else }}
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: {{ .Values.namespace }}
    ports:
    - protocol: TCP
      port: 18793
    - protocol: TCP
      port: 18789
  {{- end }}

  {{- if .Values.networkPolicy.egressRules }}
  egress:
    {{- range .Values.networkPolicy.egressRules }}
    - to:
        {{- toYaml .to | nindent 8 }}
      ports:
        {{- toYaml .ports | nindent 8 }}
    {{- end }}
  {{- else }}
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow HTTPS (for API calls)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
  # Allow HTTP (for model downloads)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 80
  {{- end }}
{{- end }}
