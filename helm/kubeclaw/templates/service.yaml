apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubeclaw.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kubeclaw.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.loadBalancerIP }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 18789
      targetPort: control
      protocol: TCP
      name: control
  selector:
    {{- include "kubeclaw.selectorLabels" . | nindent 4 }}
